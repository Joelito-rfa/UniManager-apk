name: unimanger_app
description: "UniManager - Application de gestion universitaire"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  json_annotation: ^4.9.0
  intl: ^0.19.0
  fl_chart: ^0.69.2
  flutter_pdfview: ^1.3.2
  open_file: ^3.5.10
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  connectivity_plus: ^6.1.1
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  url_launcher: ^6.3.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/app_icon.png
    - assets/images/
